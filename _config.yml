# The Site Configuration — custom terminal theme

lang: en
timezone: Asia/Jerusalem

title: Avi Zaguri
tagline: "Infrastructure Architect | Python Expert | Open Source Builder"
description: >-
  Thoughts on AI, Python, infrastructure architecture,
  and building production-grade open-source tools.

url: "https://aviz92.github.io"
baseurl: ""

github:
  username: aviz92

linkedin:
  username: avi-zaguri-41869b11b

pypi:
  username: aviz

social:
  name: Avi Zaguri
  email: ""
  links:
    - https://github.com/aviz92

avatar: "/assets/img/avatar.jpg"

# GoatCounter analytics — sign up free at goatcounter.com, then set your code
# (e.g. code: aviz92 for https://aviz92.goatcounter.com)
goatcounter:
  code: ""

comments:
  provider: giscus
  giscus:
    repo: aviz92/aviz92.github.io
    repo_id: R_kgDORduegw
    category: Announcements
    category_id: DIC_kwDORdueg84C3pMr
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: en
    reactions_enabled: 1

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/og-default.png
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - _post_template
